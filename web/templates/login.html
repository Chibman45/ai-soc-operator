<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-950 text-gray-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — AI SOC Operator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-full flex items-center justify-center">
    <div class="w-full max-w-md p-8">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-blue-400">🛡️ AI SOC Operator</h1>
            <p class="text-gray-400 mt-2">Sign in to your account</p>
        </div>

        <form method="POST" class="space-y-4 bg-gray-900 p-6 rounded-xl border border-gray-800">
            <div>
                <label class="block text-sm text-gray-400 mb-1">Username</label>
                <input type="text" name="username" required
                    class="w-full px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg text-gray-100 focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">Password</label>
                <input type="password" name="password" required
                    class="w-full px-4 py-2 bg-gray-800 border border-gray-700 rounded-lg text-gray-100 focus:outline-none focus:border-blue-500">
            </div>
            <button type="submit"
                class="w-full py-2 bg-blue-600 hover:bg-blue-500 rounded-lg font-medium transition">
                Sign In
            </button>
        </form>
    </div>
</body>
</html>
