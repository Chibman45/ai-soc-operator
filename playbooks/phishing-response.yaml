id: phishing-response-v1
name: Phishing Response
version: 1
description: >
  Response playbook for phishing emails and malicious URLs.
  Covers credential harvesting, malware delivery, and BEC attempts.

triggers:
  - alert_rule: "Phishing Email Detected"
  - alert_rule: "Malicious URL Clicked"
  - tags: ["phishing", "malicious-url", "credential-harvest"]

inputs:
  - name: alert
    required: true
  - name: observables
    required: true
    default: []

steps:
  - id: classify
    type: llm
    prompt: >
      Analyze this phishing alert. Extract: sender address, URLs, domains,
      file attachments (names + hashes), affected users, timestamps.
      Classify: credential-harvest, malware-delivery, BEC, or unknown.
      Return structured JSON.

  - id: check_false_positive
    type: rule
    when:
      condition: "classify.false_positive_probability > 0.8"
    action: skip_to
    target: generate_report

  - id: enrich
    type: toolchain
    run:
      - tool: virustotal
        operation: url
        target: "{ioc.value}"
        condition: "{ioc.type == 'url'}"
      - tool: virustotal
        operation: file
        target: "{ioc.value}"
        condition: "{ioc.type == 'hash'}"
      - tool: virustotal
        operation: domain
        target: "{ioc.value}"
        condition: "{ioc.type == 'domain'}"
      - tool: urlscan
        operation: search
        target: "{ioc.value}"
        condition: "{ioc.type == 'domain'}"
      - tool: phishtank
        operation: check-url
        target: "{ioc.value}"
        condition: "{ioc.type == 'url'}"

  - id: map_mitre
    type: mitre_mapping
    input: "{classify.iocs}"

  - id: decide
    type: llm
    prompt: >
      Produce a phishing incident summary: narrative, severity,
      affected users, IOCs, containment steps (block URL, reset credentials,
      quarantine email), and business impact.

  - id: write_case
    type: thehive
    action: create_or_update_case
    inputs:
      title: "Phishing — {classify.incident_type}"
      severity: "{decide.severity}"

  - id: attach_iocs
    type: thehive
    action: add_observables
    case_id: "{write_case.case_id}"

  - id: generate_report
    type: report
    report_type: incident
